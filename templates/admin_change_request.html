{% extends "layout.html" %}

{% block content %}
<div class="container" style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px;">
    
    <div class="form-container" style="width: 100%; max-width: 420px; margin: 0;">
        <div class="text-center mb-4">
            <div style="font-size: 2.8rem; margin-bottom: 15px;">🛡️</div>
            <h2 style="font-weight: 900; letter-spacing: -1.5px; color: #0f172a;">Security Check</h2>
            <p style="color: #64748b; font-size: 0.95rem;">Verify your email to receive a password change link.</p>
        </div>

        <form method="POST">
            <div class="mb-4">
                <label class="form-label small fw-bold text-uppercase" style="letter-spacing: 1px; color: #1e293b; display: block; margin-bottom: 8px;">
                    Admin Email Address
                </label>
                <input type="email" name="email" class="form-control shadow-sm" 
                       placeholder="" required 
                       style="width: 100%; border-radius: 12px; padding: 14px; border: 1px solid #e2e8f0; box-sizing: border-box;">
            </div>

            <button type="submit" class="pill-btn w-100" 
                    style="background: #14b8a6; border: none; cursor: pointer; padding: 16px; font-size: 14px;">
                Send Verification Link
            </button>
        </form>

        <div class="text-center mt-4">
            <p style="font-size: 0.85rem; color: #94a3b8;">
                Remembered your password? 
                <a href="{{ url_for('admin_login') }}" style="color: #14b8a6; text-decoration: none; font-weight: 700;">
                    Back to Login
                </a>
            </p>
        </div>
    </div>

</div>

<style>
    /* Keep input interaction consistent with the rest of your app */
    .form-control:focus {
        border-color: #14b8a6 !important;
        box-shadow: 0 0 0 4px rgba(20, 184, 166, 0.1) !important;
        outline: none;
    }
    
    /* Ensure button transitions smoothly */
    .pill-btn {
        transition: all 0.3s ease;
    }
</style>
{% endblock %}
