{% extends "layout.html" %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0" style="border-radius: 15px;">
                <div class="card-body p-5">
                    <h3 class="text-center fw-bold mb-4">Update Password</h3>
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Current Password</label>
                            <input type="password" name="old_password" class="form-control" required style="border-radius: 8px;">
                        </div>
                        <hr class="my-4">
                        <div class="mb-3">
                            <label class="form-label fw-bold small">New Password</label>
                            <input type="password" name="new_password" class="form-control" required style="border-radius: 8px;">
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold small">Confirm New Password</label>
                            <input type="password" name="confirm_password" class="form-control" required style="border-radius: 8px;">
                        </div>
                        <button type="submit" class="btn w-100 fw-bold py-3" style="background-color: #20c997; color: white; border-radius: 8px; text-transform: uppercase; letter-spacing: 1px;">
                            Update Securely
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
