{% extends "layout.html" %}
{% block content %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background-color: #f8fafc; padding: 20px;">
    <div style="width: 100%; max-width: 480px; background: white; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #e2e8f0;">
        
        <div style="padding: 40px 20px 20px; text-align: center;">
            <div style="width: 70px; height: 70px; background: #e6fffa; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                <i class="fas fa-paper-plane" style="color: #2dd4bf; font-size: 1.8rem;"></i>
            </div>
            <h2 style="font-size: 1.75rem; font-weight: 700; color: #1e293b; margin-bottom: 8px;">Reset Password</h2>
            <p style="color: #64748b; font-size: 0.95rem;">Enter your new credentials to secure your account.</p>
        </div>

        <div style="padding: 0 40px 40px;">
            <form action="{{ url_for('reset_with_token', token=token) }}" method="POST">
                
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-size: 0.9rem; font-weight: 600; color: #475569; margin-bottom: 8px;">New Password</label>
                    <input type="password" name="new_password" 
                           style="width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid #e2e8f0; background: #f8fafc; outline: none; transition: border-color 0.2s;" 
                           placeholder=required>
                </div>

                <div style="margin-bottom: 30px;">
                    <label style="display: block; font-size: 0.9rem; font-weight: 600; color: #475569; margin-bottom: 8px;">Confirm New Password</label>
                    <input type="password" name="confirm_password" 
                           style="width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid #e2e8f0; background: #f8fafc; outline: none; transition: border-color 0.2s;" 
                           placeholder=required>
                </div>

                <button type="submit" 
                        style="width: 100%; padding: 14px; background: #2dd4bf; color: white; border: none; border-radius: 12px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px;">
                    Update Password <i class="fas fa-chevron-right" style="font-size: 0.8rem;"></i>
                </button>

                <div style="text-align: center; margin-top: 25px;">
                    <a href="{{ url_for('admin_login') }}" style="color: #64748b; text-decoration: none; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 8px;">
                        <i class="fas fa-arrow-left" style="font-size: 0.8rem;"></i> Back to Login
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    input:focus { border-color: #2dd4bf !important; }
    button:hover { background: #14b8a6 !important; }
</style>
{% endblock %}
