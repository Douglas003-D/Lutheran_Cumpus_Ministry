{% extends "layout.html" %}

{% block content %}
<div class="container" style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px;">
    
    <div class="form-container" style="width: 100%; max-width: 480px; margin: 0;">
        
        <!-- Header Section -->
        <div class="text-center mb-4">
            <div style="width: 70px; height: 70px; background: rgba(20, 184, 166, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                <span style="font-size: 2rem;">🔑</span>
            </div>
            <h2 style="font-weight: 900; letter-spacing: -1.5px; color: #0f172a;">Reset Password</h2>
            <p style="color: #64748b; font-size: 0.95rem;">Enter your new credentials to secure your account.</p>
        </div>

        <!-- Form Section -->
        <form action="{{ url_for('reset_with_token', token=token) }}" method="POST">
            
            <!-- New Password -->
            <div class="mb-4">
                <label class="form-label small fw-bold text-uppercase" style="letter-spacing: 1px; color: #1e293b; display: block; margin-bottom: 8px;">
                    New Password
                </label>
                <input type="password" name="new_password" class="form-control shadow-sm" 
                       placeholder="" required 
                       style="width: 100%; border-radius: 12px; padding: 14px; border: 1px solid #e2e8f0; background: #f8fafc; box-sizing: border-box;">
            </div>

            <!-- Confirm Password -->
            <div class="mb-4">
                <label class="form-label small fw-bold text-uppercase" style="letter-spacing: 1px; color: #1e293b; display: block; margin-bottom: 8px;">
                    Confirm New Password
                </label>
                <input type="password" name="confirm_password" class="form-control shadow-sm" 
                       placeholder="" required 
                       style="width: 100%; border-radius: 12px; padding: 14px; border: 1px solid #e2e8f0; background: #f8fafc; box-sizing: border-box;">
            </div>

            <button type="submit" class="pill-btn w-100" 
                    style="background: #14b8a6; border: none; cursor: pointer; padding: 16px; display: flex; align-items: center; justify-content: center; gap: 10px;">
                Update Password <span style="font-size: 0.8rem;">➔</span>
            </button>

            <!-- Navigation Link -->
            <div class="text-center mt-4">
                <a href="{{ url_for('admin_login') }}" style="color: #64748b; text-decoration: none; font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <span>←</span> Back to Login
                </a>
            </div>
        </form>
    </div>

</div>

<style>
    /* Consistent focus states for security inputs */
    .form-control:focus {
        border-color: #14b8a6 !important;
        box-shadow: 0 0 0 4px rgba(20, 184, 166, 0.1) !important;
        outline: none;
        background: #fff !important;
    }

    /* Transition for the back link */
    .text-center a:hover {
        color: #14b8a6 !important;
        transition: color 0.3s ease;
    }
</style>
{% endblock %}
