{% extends "layout.html" %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 85vh; background-color: #f8f9fa;">
    
    <div style="background: white; width: 100%; max-width: 440px; padding: 50px 40px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); text-align: center;">
        
        <div style="width: 70px; height: 70px; background-color: #e6f9f5; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px;">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="#20c997" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>

        <h2 style="font-weight: 800; color: #1a202c; margin-bottom: 8px; font-size: 1.75rem;">Security Verification</h2>
        <p style="color: #718096; font-size: 0.95rem; margin-bottom: 35px;">Verify your admin email to proceed with the password change.</p>

        <form method="POST" style="text-align: left;">
            <div style="margin-bottom: 25px;">
                <label style="display: block; font-weight: 700; color: #4a5568; font-size: 0.85rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px;">Admin Email Address</label>
                <input type="email" name="email" placeholder="e.g. admin@lcm.org" required 
                    style="width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid #e2e8f0; background-color: #f8fafc; font-size: 1rem; outline: none; transition: border-color 0.2s;">
            </div>

            <button type="submit" 
                style="width: 100%; background-color: #20c997; color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: transform 0.1s, background-color 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;">
                Generate Security Link <i class="fas fa-chevron-right" style="font-size: 0.8rem;"></i>
            </button>
        </form>

        <div style="margin-top: 25px; border-top: 1px solid #f1f5f9; padding-top: 20px;">
            <a href="{{ url_for('admin_dashboard') }}" style="color: #20c997; text-decoration: none; font-size: 0.9rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <i class="fas fa-arrow-left" style="font-size: 0.75rem;"></i> Back to Dashboard
            </a>
        </div>
    </div>
</div>

<style>
    /* Hover Effects */
    input:focus { border-color: #20c997 !important; background-color: #fff !important; }
    button:hover { background-color: #1ba87e; box-shadow: 0 4px 12px rgba(32, 201, 151, 0.2); }
    button:active { transform: scale(0.98); }
</style>
{% endblock %}
